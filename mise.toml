[tools]
zig = "latest"
go = "latest"
node = "lts"
pkl = "latest"
hk = "latest"
"npm:@fission-ai/openspec" = "latest"

[env]
HK_MISE = "1"

[hooks]
postinstall = """
  hk install --mise
  if [ ! -d openspec ]; then
    openspec init --tools claude
  else
    openspec update
  fi
"""

[tasks.test]
run = "zig build test && cd go && go test ./..."
description = "Run all parser tests (Zig + Go)"

[tasks."test:zig"]
run = "zig build test"
description = "Run Zig parser tests"

[tasks."test:go"]
run = "cd go && go test ./..."
description = "Run Go parser tests"

[tasks.lint]
run = "zig fmt --check zig/"
description = "Check source formatting"

[tasks.fmt]
run = "zig fmt zig/"
description = "Format all source files in place"

[tasks.clean]
run = "rm -rf zig-out zig-cache .zig-cache"
description = "Remove build artifacts"

[tasks.check]
depends = ["lint", "test"]
description = "Full check - lint + tests"

[tasks."plugins:tree-sitter:generate"]
run = "cd tools/tree-sitter-skg && npm install && npx tree-sitter generate"
description = "Regenerate the tree-sitter parser from grammar.js"

[tasks."plugins:tree-sitter:build"]
depends = ["plugins:tree-sitter:generate"]
run = "cd tools/tree-sitter-skg && npx tree-sitter build"
description = "Build the native tree-sitter parser shared library"

[tasks."plugins:tree-sitter:wasm"]
depends = ["plugins:tree-sitter:generate"]
run = "cd tools/tree-sitter-skg && npx tree-sitter build --wasm"
description = "Build the WASM tree-sitter parser (for Zed, web editors)"

[tasks."plugins:vscode:package"]
run = "cd tools/vscode-skg && npm install && npx vsce package --out skg.vsix"
description = "Package the VS Code extension as tools/vscode-skg/skg.vsix"

[tasks."plugins:vscode:install"]
depends = ["plugins:vscode:package"]
run = "code --install-extension tools/vscode-skg/skg.vsix"
description = "Build and install the VS Code extension into the local VS Code"

[tasks."plugins:build"]
depends = ["plugins:tree-sitter:build", "plugins:vscode:package"]
description = "Build all editor plugins (tree-sitter native + vscode vsix)"

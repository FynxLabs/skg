name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Build
        run: zig build

      - name: Test
        run: zig build test

      - name: Lint
        run: zig fmt --check src/
